<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="strap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- iOS auto-rounds corners, fill full square with gradient bg -->
  <rect width="180" height="180" fill="url(#bg)"/>

  <!-- Subtle decorative dots -->
  <circle cx="30" cy="30" r="1.5" fill="#93c5fd" opacity="0.4"/>
  <circle cx="150" cy="40" r="1.5" fill="#93c5fd" opacity="0.4"/>
  <circle cx="40" cy="150" r="1.5" fill="#93c5fd" opacity="0.4"/>
  <circle cx="155" cy="155" r="1.5" fill="#93c5fd" opacity="0.4"/>

  <!-- Notebook body (slightly tilted right back side) -->
  <g filter="url(#shadow)">
    <!-- back page peek (slightly offset for depth) -->
    <rect x="42" y="36" width="100" height="120" rx="6" fill="#cbd5e1"/>
    <!-- main notebook cover -->
    <rect x="38" y="32" width="100" height="120" rx="8" fill="url(#cover)" stroke="#94a3b8" stroke-width="0.8"/>
  </g>

  <!-- Top color bar (Sapphire accent) -->
  <rect x="38" y="32" width="100" height="14" rx="8" fill="#1e3a8a"/>
  <rect x="38" y="40" width="100" height="6" fill="#1e3a8a"/>

  <!-- Spring binding (left edge) -->
  <g fill="#1e293b">
    <circle cx="42" cy="60" r="2.4"/>
    <circle cx="42" cy="76" r="2.4"/>
    <circle cx="42" cy="92" r="2.4"/>
    <circle cx="42" cy="108" r="2.4"/>
    <circle cx="42" cy="124" r="2.4"/>
    <circle cx="42" cy="140" r="2.4"/>
  </g>
  <!-- Spring rings (white inner) -->
  <g fill="#ffffff">
    <circle cx="42" cy="60" r="0.9"/>
    <circle cx="42" cy="76" r="0.9"/>
    <circle cx="42" cy="92" r="0.9"/>
    <circle cx="42" cy="108" r="0.9"/>
    <circle cx="42" cy="124" r="0.9"/>
    <circle cx="42" cy="140" r="0.9"/>
  </g>

  <!-- Lines on the page (right of binding) -->
  <g stroke="#cbd5e1" stroke-width="1.4" stroke-linecap="round">
    <line x1="56" y1="62" x2="128" y2="62"/>
    <line x1="56" y1="78" x2="128" y2="78"/>
    <line x1="56" y1="94" x2="128" y2="94"/>
    <line x1="56" y1="110" x2="128" y2="110"/>
    <line x1="56" y1="126" x2="128" y2="126"/>
  </g>

  <!-- Red bookmark ribbon (top-right corner) -->
  <path d="M 118 32 L 132 32 L 132 60 L 125 54 L 118 60 Z" fill="url(#strap)"/>

  <!-- Subtle title text at bottom -->
  <text x="90" y="172" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-weight="800" font-size="11" fill="#ffffff" letter-spacing="2">AWAKE</text>
</svg>
